# This is a Databricks asset bundle definition for olist-databricks-medallion-lakehouse.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: olist-databricks-medallion-lakehouse

artifacts:
  default:
    type: whl
    build: python -m build
    path: .

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-5107ec37-a8d9.cloud.databricks.com

  ## Optionally, there could be 'staging' or 'prod' targets here.
  #
  # prod:
  #   workspace:
  #     host: https://dbc-5107ec37-a8d9.cloud.databricks.com
